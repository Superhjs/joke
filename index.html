<!DOCTYPE html>
<html>
<head>
  <title>System Error</title>
</head>
<body style="
  margin:0;
  background:#0078D7;
  color:white;
  width:100vw;
  height:100vh;
  font-family: 'Segoe UI', sans-serif;
  padding:60px;
  overflow:hidden;
" onclick="goFullscreen()">

<h1 style="font-size:110px; margin:0;">:(</h1>

<h2 style="font-size:44px; margin-top:20px; font-weight:500;">
  Your PC ran into a problem and needs to restart.
</h2>

<p style="font-size:26px; margin-top:40px;">
  We're just collecting some error info, and then we'll restart for you.
</p>

<p id="percent" style="margin-top:60px; font-size:34px;">
  0% complete
</p>

<p style="margin-top:80px; font-size:20px; line-height:1.6;">
  Error Code: CRITICAL_PROCESS_DIED<br>
  System Status: Compromised
</p>

<script>
function goFullscreen() {
  let el = document.documentElement;
  if (el.requestFullscreen) el.requestFullscreen();
}

// Try auto fullscreen
goFullscreen();

let percent = 0;
let interval = setInterval(() => {
  percent++;
  document.getElementById("percent").innerText = percent + "% complete";

  if (percent >= 100) {
    clearInterval(interval);
    setTimeout(() => {
      document.body.innerHTML = `
        <div style="text-align:center; margin-top:120px; font-family:Arial;">
          <h1 style="font-size:60px;">😂 You got pranked!</h1>
          <p style="font-size:28px;">Happy April Fools!</p>
        </div>
      `;
    }, 1200);
  }
}, 45);
</script>

</body>
</html>
